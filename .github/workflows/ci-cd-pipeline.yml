name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    name: Build and validate Docker deployment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t ci-cd-sample .

      - name: Verify HTML file exists
        run: test -f ci-cd-sample.html

      - name: Run container and validate page
        run: |
          docker run -d --name ci_cd_sample -p 8080:80 ci-cd-sample
          timeout 10 bash -c 'until curl --silent --fail http://localhost:8080; do sleep 1; done'
          curl --silent --fail http://localhost:8080 | grep -q "CI/CD Pipeline Documentation"
          docker stop ci_cd_sample
          docker rm ci_cd_sample

  deploy:
    name: Deploy container to remote server via SSH
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy Docker files to remote server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "Dockerfile,ci-cd-sample.html"
          target: "~/ci-cd-sample"

      - name: Run remote Docker container
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            mkdir -p ~/ci-cd-sample
            cd ~/ci-cd-sample
            docker build -t ci-cd-sample .
            docker stop ci-cd-sample || true
            docker rm ci-cd-sample || true
            docker run -d --restart unless-stopped -p 8080:80 --name ci-cd-sample ci-cd-sample
